# ==========================
# ===   General Settings ===
# ==========================

# Enable mouse support (clickable windows, panes, resizable panes)
set -g mouse on

# Set scrollback history to 50k lines
set-option -g history-limit 50000

# Fix colors and enable True Color support
set -g default-terminal "screen-256color"
set-option -sa terminal-overrides ",xterm*:Tc"

# Start windows and panes at index 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows automatically when one is closed
set -g renumber-windows on

# Reduce delay when pressing Esc (improves Vim/NeoVim responsiveness)
set -s escape-time 0


# ==========================
# ===   Key Bindings     ===
# ==========================

# --- Split Panes ---
# Split vertically (Left & Right) with Ctrl+b then |
bind | split-window -h -c "#{pane_current_path}"

# Split horizontally (Top & Bottom) with Ctrl+b then -
bind - split-window -v -c "#{pane_current_path}"

# Unbind the awkward default keys
unbind '"'
unbind %

# --- Navigation ---
# NOTE: The manual C-h/j/k/l bindings have been REMOVED.
# The 'vim-tmux-navigator' plugin below now handles these keys smartly.

# Restore Clear Screen (C-l)
# Since the plugin uses C-l for navigation, use <prefix> C-l to clear screen
bind C-l send-keys 'C-l'

# --- Configuration Management ---
# Reload config file quickly with 'r'
bind r source-file ~/.tmux.conf \; display "Config reloaded!"


# ==========================
# ===   Status Bar UI    ===
# ==========================

# Base status bar colors (Dark Navy background, Light Gray text)
set -g status-style "bg=#0D1017,fg=#B3B1AD"
set -g status-left-length 50
set -g status-right-length 50

# Left side: Session name inside a solid Gold square block
set -g status-left "#[bg=#E6B450,fg=#0A0E14,bold] #S #[bg=#0D1017,fg=#B3B1AD,nobold]  "

# Right side: Date and Time inside a Muted square block
set -g status-right "#[bg=#626A73,fg=#0A0E14,bold] %Y-%m-%d %H:%M "

# Window tabs
# Inactive windows: Plain text on base background
set -g window-status-format         "#[fg=#626A73,bg=#0D1017]  #I:#W  "

# Active window: Solid Cyan square block with dark text
set -g window-status-current-format "#[bg=#39BAE6,fg=#0A0E14,bold]  #I:#W  "
set -g window-status-separator      ""

# Pane borders
set -g pane-border-style        "fg=#1A1F29"
set -g pane-active-border-style "fg=#E6B450"


# ==========================
# ===   Plugins          ===
# ==========================

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'


# ==========================================
# ===   Keep this at the very bottom     ===
# ==========================================
run '~/.tmux/plugins/tpm/tpm'
